<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Black Void — Arthur Zaki Miyazaki</title>
  <desc id="desc">Founder control surface for AI, automation, infrastructure and software engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050608"/>
      <stop offset="0.55" stop-color="#080B10"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="halo" cx="78%" cy="42%" r="44%">
      <stop offset="0" stop-color="#3B82F6" stop-opacity=".18"/>
      <stop offset=".55" stop-color="#3B82F6" stop-opacity=".035"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#94A3B8" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="1198" height="418" rx="18" fill="url(#bg)" stroke="#272A31"/>
  <rect x="1" y="1" width="1198" height="418" rx="18" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="418" rx="18" fill="url(#halo)"/>
  <path d="M32 72V33h39M1128 33h39v39M32 348v39h39M1128 387h39v-39" fill="none" stroke="#71717A" stroke-opacity=".38"/>
  <g transform="translate(900 195)" fill="none">
    <circle r="116" stroke="#3B82F6" stroke-opacity=".12"/>
    <circle r="82" stroke="#F4F4F5" stroke-opacity=".09" stroke-dasharray="2 8"/>
    <circle r="44" stroke="#3B82F6" stroke-opacity=".24"/>
    <ellipse rx="150" ry="45" transform="rotate(-18)" stroke="#3B82F6" stroke-opacity=".16"/>
    <circle cx="-117" cy="-11" r="3" fill="#60A5FA" filter="url(#glow)"/>
    <circle r="7" fill="#3B82F6" fill-opacity=".7" filter="url(#glow)"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="64" y="63" fill="#60A5FA" font-size="12" font-weight="600" letter-spacing="3">BLACK VOID / CONTROL SURFACE</text>
    <circle cx="1137" cy="57" r="4" fill="#22C55E"/>
    <text x="1122" y="61" fill="#A1A1AA" font-size="10" text-anchor="end" letter-spacing="1.5">SYSTEM ONLINE</text>
    <text x="64" y="165" fill="#F4F4F5" font-size="62" font-weight="700" letter-spacing="-2">ARTHUR “ZAKI”</text>
    <text x="64" y="222" fill="#F4F4F5" font-size="62" font-weight="700" letter-spacing="-2">MIYAZAKI</text>
    <text x="67" y="266" fill="#A1A1AA" font-size="15" font-weight="500" letter-spacing="3">FOUNDER · FULL STACK · AI ENGINEER</text>
    <text x="67" y="326" fill="#E4E4E7" font-size="17">Building intelligent systems at the edge of</text>
    <text x="67" y="353" fill="#E4E4E7" font-size="17">software, automation and infrastructure.</text>
    <text x="1137" y="365" fill="#71717A" font-size="10" text-anchor="end" letter-spacing="2">DOURADOS / MS / BR</text>
  </g>
</svg>
